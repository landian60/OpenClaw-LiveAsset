name: artifact-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap
        run: ./scripts/bootstrap.sh
      - name: Check
        run: ./scripts/check.sh

  macos-smoke:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap
        run: ./scripts/bootstrap.sh
      - name: Check
        run: ./scripts/check.sh
